name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

env:
  SOURCE_DIR: source
  PUBLISH_BRANCH: gh-pages
  PUBLISH_DIR: _site

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source with LFS files
        uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 1
          path: ${{ env.SOURCE_DIR }}

      - name: Verify LFS tracking rules
        shell: bash
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -euo pipefail

          bash .githooks/lfs-guard.sh --tree HEAD
          git lfs fsck --pointers

      - name: Verify LFS objects exist on origin
        shell: bash
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -euo pipefail

          git lfs fetch origin HEAD
          git lfs fsck --objects

      - name: Prepare publish directory
        shell: bash
        run: |
          set -euo pipefail

          rm -rf "${PUBLISH_DIR}"
          mkdir -p "${PUBLISH_DIR}"

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.githooks/' \
            --exclude='.agents/' \
            --exclude='.gitattributes' \
            --exclude='AGENTS.md' \
            --exclude='CLAUDE.md' \
            --exclude='docs/ai/' \
            --exclude="start-local-server.*" \
            --exclude="${PUBLISH_DIR}/" \
            "${SOURCE_DIR}/" "${PUBLISH_DIR}/"

          touch "${PUBLISH_DIR}/.nojekyll"
          cat > "${PUBLISH_DIR}/.gitattributes" <<'ATTRIBUTES'
          # Disable Git LFS filters on the published Pages branch.
          * -filter -diff -merge
          *.html text eol=lf
          *.css text eol=lf
          *.js text eol=lf
          CNAME text eol=lf
          .nojekyll text eol=lf
          ATTRIBUTES

          if grep -RIl '^version https://git-lfs.github.com/spec/v1$' "${PUBLISH_DIR}"; then
            echo "Git LFS pointer files found in ${PUBLISH_DIR}; GitHub Pages must receive real asset files." >&2
            exit 1
          fi

      - name: Force-push publish branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          cd "${PUBLISH_DIR}"
          git init --initial-branch="${PUBLISH_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "HEAD:${PUBLISH_BRANCH}"

      - name: Request Pages build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"
