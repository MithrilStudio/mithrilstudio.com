name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  SOURCE_DIR: source
  PUBLISH_BRANCH: gh-pages
  PUBLISH_DIR: source/dist

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source with LFS files
        uses: actions/checkout@v7
        with:
          lfs: true
          fetch-depth: 1
          path: ${{ env.SOURCE_DIR }}

      - name: Verify LFS tracking rules
        shell: bash
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -euo pipefail

          bash .githooks/lfs-guard.sh --tree HEAD
          git lfs fsck --pointers

      - name: Verify LFS objects exist on origin
        shell: bash
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          set -euo pipefail

          git lfs fetch origin HEAD
          git lfs fsck --objects

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ env.SOURCE_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ env.SOURCE_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Build and validate site
        working-directory: ${{ env.SOURCE_DIR }}
        run: pnpm build

      - name: Prepare publish snapshot
        shell: bash
        env:
          CNAME: ${{ vars.CNAME }}
        run: |
          set -euo pipefail

          test -d "${PUBLISH_DIR}"
          test -f "${PUBLISH_DIR}/.nojekyll"

          cname=$(printf '%s' "${CNAME}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          case "${cname}" in
            '' | *[[:space:]]*)
              echo "CNAME Repository variable is missing or not a bare domain; cannot provision a custom domain." >&2
              exit 1
              ;;
          esac
          printf '%s\n' "${cname}" > "${PUBLISH_DIR}/CNAME"
          test -f "${PUBLISH_DIR}/CNAME"

          cat > "${PUBLISH_DIR}/.gitattributes" <<'ATTRIBUTES'
          # Disable Git LFS filters on the published Pages branch.
          * -filter -diff -merge
          *.html text eol=lf
          *.css text eol=lf
          *.js text eol=lf
          CNAME text eol=lf
          .nojekyll text eol=lf
          ATTRIBUTES

          if grep -RIl '^version https://git-lfs.github.com/spec/v1$' "${PUBLISH_DIR}"; then
            echo "Git LFS pointer files found in ${PUBLISH_DIR}; GitHub Pages must receive real asset files." >&2
            exit 1
          fi

      - name: Force-push publish branch
        shell: bash
        env:
          WEBSITE_DEPLOY_KEY: ${{ secrets.WEBSITE_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${WEBSITE_DEPLOY_KEY}" ]; then
            echo "WEBSITE_DEPLOY_KEY secret is not configured." >&2
            exit 1
          fi

          ssh_key="${RUNNER_TEMP}/website_deploy_key"
          known_hosts="${RUNNER_TEMP}/website_known_hosts"
          printf '%s\n' "${WEBSITE_DEPLOY_KEY}" | tr -d '\r' > "${ssh_key}"
          chmod 600 "${ssh_key}"
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com > "${known_hosts}"

          cd "${PUBLISH_DIR}"
          git init --initial-branch="${PUBLISH_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config core.sshCommand "ssh -i ${ssh_key} -o IdentitiesOnly=yes -o UserKnownHostsFile=${known_hosts} -o StrictHostKeyChecking=yes"
          git add --all
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "git@github.com:${GITHUB_REPOSITORY}.git"
          git push --force origin "HEAD:${PUBLISH_BRANCH}"
