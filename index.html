<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WE ARE BACK!</title>
    <script>
      (() => {
        const documentElement = document.documentElement;
        const languages =
          Array.isArray(navigator.languages) && navigator.languages.length
            ? navigator.languages
            : [navigator.language || documentElement.lang || "en-US"];
        const normalizedLanguages = languages.map((language) => language.toLowerCase());
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
        const mainlandChinaTimeZones = new Set([
          "Asia/Shanghai",
          "Asia/Urumqi",
          "Asia/Chongqing",
          "Asia/Chungking",
          "Asia/Harbin",
          "Asia/Kashgar",
          "PRC",
        ]);
        const shouldAvoidGoogleFonts =
          mainlandChinaTimeZones.has(timeZone) ||
          normalizedLanguages.some((language) => /^zh(?:$|-hans\b|-cn\b)/.test(language));

        const fontFaces = {
          google: {
            body: {
              default: "Noto+Sans",
              "zh-Hans": "Noto+Sans+SC",
              "zh-Hant": "Noto+Sans+TC",
              ja: "Noto+Sans+JP",
              ko: "Noto+Sans+KR",
            },
            heading: "Cinzel",
          },
          jsdelivr: {
            body: {
              default: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans@latest/wght.css",
              "zh-Hans": "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans-sc@latest/wght.css",
              "zh-Hant": "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans-tc@latest/wght.css",
              ja: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans-jp@latest/wght.css",
              ko: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans-kr@latest/wght.css",
            },
            heading: "https://cdn.jsdelivr.net/npm/@fontsource-variable/cinzel@latest/wght.css",
          },
        };

        const addPreconnect = (href, crossOrigin = false) => {
          const link = document.createElement("link");
          link.rel = "preconnect";
          link.href = href;
          if (crossOrigin) {
            link.crossOrigin = "";
          }
          document.head.append(link);
        };

        const addStylesheet = (href, onError) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = href;
          if (onError) {
            link.addEventListener("error", onError, { once: true });
          }
          document.head.append(link);
        };

        const loadJsDelivrFonts = () => {
          documentElement.dataset.fontCdn = "jsdelivr";
          addPreconnect("https://cdn.jsdelivr.net");
          addStylesheet(fontFaces.jsdelivr.body.default);
          addStylesheet(fontFaces.jsdelivr.heading);
        };

        if (shouldAvoidGoogleFonts) {
          loadJsDelivrFonts();
          return;
        }

        documentElement.dataset.fontCdn = "google";
        addPreconnect("https://fonts.googleapis.com");
        addPreconnect("https://fonts.gstatic.com", true);
        addStylesheet(
          `https://fonts.googleapis.com/css2?family=${fontFaces.google.heading}:wght@400;600;700&family=${fontFaces.google.body.default}:wght@400;500;600;700&display=swap`,
          loadJsDelivrFonts,
        );
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-primary-bg: #0a0a0f;
        --color-secondary-bg: #1a1a2e;
        --color-primary-text: #e8e6e3;
        --color-accent: #7b6b57;
        --color-secondary: #8b7355;
        --font-heading: var(--site-font-heading);
      }
      :root {
        --site-font-body:
          "Noto Sans",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        --site-font-heading: "Cinzel", serif;
      }
      html[data-font-cdn="jsdelivr"] {
        --site-font-body:
          "Noto Sans Variable",
          "Noto Sans",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        --site-font-heading: "Cinzel Variable", "Cinzel", serif;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: var(--color-primary-bg);
        color: var(--color-primary-text);
        font-family: var(--site-font-body);

        min-height: 100vh;
        margin: 0;
        line-height: 1.6;
        letter-spacing: 0.02em;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: var(--site-font-heading);
        letter-spacing: 0.05em;
      }
      .texture-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.03;
        background-image:
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(201, 168, 76, 0.15) 2px,
            rgba(201, 168, 76, 0.15) 3px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 4px,
            rgba(139, 115, 85, 0.1) 4px,
            rgba(139, 115, 85, 0.1) 5px
          );
      }

      span[class*="tag_bg.png"] {
        border-radius: 3px;
        overflow: hidden;
      }

    </style>
    <style>
      #guessTrigger {
        border: 0;
        background: transparent;
        padding: 0;
        cursor: pointer;
      }

      .hero-background-media {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      dialog::backdrop {
        background: rgba(3, 4, 8, 0.78);
        backdrop-filter: blur(4px);
      }

      #guessDialog,
      #guessResultDialog {
        position: fixed;
        top: 50%;
        left: 50%;
        top: 50dvh;
        left: 50vw;
        width: min(92vw, 420px);
        max-height: min(90dvh, 560px);
        margin: 0;
        overflow-y: auto;
        transform: translate(-50%, -50%);
        box-sizing: border-box;
        -webkit-overflow-scrolling: touch;
      }

      #guessForm {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 28px 24px;
      }

      #guessDialog form {
        box-sizing: border-box;
      }

      #guessDialog h2,
      #guessResultDialog h2 {
        margin: 0;
        color: #e8e6e3;
        font-family: var(--site-font-heading);
        font-size: 24px;
        line-height: 1.25;
        letter-spacing: 0;
        text-align: center;
      }

      #guessDialog label {
        display: block;
        color: #d7d0c8;
        font-size: 14px;
        line-height: 1.4;
        text-align: left;
      }

      #guessDialog input {
        display: block;
        width: 100%;
        box-sizing: border-box;
        margin-top: 8px;
        border: 1px solid rgba(123, 107, 87, 0.7);
        border-radius: 4px;
        background: #15151d;
        color: #f4efe8;
        font-size: 16px;
        line-height: 1.4;
        padding: 12px;
        outline: none;
      }

      #guessDialog input:focus {
        border-color: #c9a84c;
        box-shadow: 0 0 0 1px #c9a84c;
      }

      #guessDialog button[type="submit"],
      #guessResultConfirm {
        width: 100%;
        min-height: 48px;
        border: 1px solid rgba(201, 168, 76, 0.7);
        border-radius: 4px;
        background: #7b6b57;
        color: #fff9ef;
        font-family: var(--site-font-heading);
        font-size: 14px;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      #guessDialog button[type="submit"]:hover,
      #guessDialog button[type="submit"]:focus-visible,
      #guessResultConfirm:hover,
      #guessResultConfirm:focus-visible {
        background: #8b7355;
      }

      #guessResultPanel {
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 28px 24px;
        text-align: center;
      }

      #guessResultMessage {
        margin: 0;
        color: #d7d0c8;
        font-size: 15px;
        line-height: 1.7;
        letter-spacing: 0;
      }

      #guessResultConfirm {
        min-height: 48px;
        cursor: pointer;
        outline: none;
      }

      #guessResultConfirm:focus-visible {
        box-shadow: 0 0 0 2px #c9a84c;
      }

      @media (max-width: 480px) {
        #guessDialog,
        #guessResultDialog {
          width: calc(100vw - 32px);
          max-height: calc(100dvh - 32px);
        }

        #guessForm {
          padding: 24px 18px;
        }
      }
    </style>
  </head>
  <body class="bg-[#05070f]">
    <div class="min-h-screen text-primary-text relative">
      <div class="texture-overlay" aria-hidden="true"></div>

      <div class="relative z-10">
        <section id="hero" class="relative min-h-screen flex items-center justify-center overflow-hidden">
          <div id="heroBackground" class="absolute inset-0" aria-hidden="true">
            <img class="hero-background-media" src="./static/bg.jpg" alt="" />
          </div>

          <div
            class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_rgba(201,168,76,0.08)_0%,_transparent_70%)]"
            aria-hidden="true"
          ></div>

          <div class="relative z-10 text-center px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto -mt-14 sm:mt-0">
            <h1 class="mb-5 sm:mb-8 leading-tight">
              <img
                src="./static/logo1.png"
                alt="Dungeon Enigma"
                class="mx-auto w-full max-w-[520px] sm:max-w-[680px] lg:max-w-[760px] h-auto"
              />
            </h1>
            <h1 class="mb-5 sm:mb-8 leading-tight text-1xl sm:text-2xl sm:whitespace-nowrap">
              "Those who name the blood may earn the right to tread the dungeon."
            </h1>
            <div class="mb-6 sm:mb-8">
              <button
                id="guessTrigger"
                type="button"
                class="inline-block cursor-pointer border-0 bg-transparent p-0 transition duration-200 hover:scale-[1.02] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#c9a84c] focus-visible:ring-offset-4 focus-visible:ring-offset-[#05070f]"
              >
                <img
                  src="./static/btn_more.png"
                  alt="Whisper Your Guess"
                  class="mx-auto w-[220px] sm:w-[280px] lg:w-[360px] h-auto"
                />
              </button>
            </div>
            <img
              src="./static/txt_slogan.png"
              alt="First-Person Medieval Extraction Looter RPG"
              class="mx-auto w-[280px] sm:w-[420px] lg:w-[560px] h-auto opacity-95"
            />
          </div>
        </section>

        <div class="relative w-full flex justify-center">
          <img src="./static/bottom_highlight.png" alt="" aria-hidden="true" class="h-[2px] w-auto" />
        </div>
      </div>
    </div>

    <dialog
      id="guessDialog"
      tabindex="-1"
      class="rounded-md border border-[#7b6b57]/60 bg-[#0b0c12]/95 p-0 text-primary-text shadow-2xl shadow-black/60"
      aria-labelledby="guessDialogTitle"
    >
      <form id="guessForm" class="space-y-5 px-6 py-7 sm:px-8" novalidate>
        <div class="text-center">
          <h2 id="guessDialogTitle" class="text-xl sm:text-2xl text-[#e8e6e3]">Whisper Your Guess</h2>
        </div>

        <label class="block text-left text-sm text-[#d7d0c8]">
          Guess Name
          <input
            id="guessName"
            name="guessName"
            type="text"
            required
            autocomplete="off"
            class="mt-2 block w-full rounded border border-[#7b6b57]/70 bg-[#15151d] px-3 py-3 text-base text-[#f4efe8] outline-none transition placeholder:text-[#8b8174] focus:border-[#c9a84c] focus:ring-1 focus:ring-[#c9a84c]"
            placeholder="Enter the name"
          />
        </label>

        <label class="block text-left text-sm text-[#d7d0c8]">
          Email Address
          <input
            name="email"
            type="email"
            required
            autocomplete="email"
            class="mt-2 block w-full rounded border border-[#7b6b57]/70 bg-[#15151d] px-3 py-3 text-base text-[#f4efe8] outline-none transition placeholder:text-[#8b8174] focus:border-[#c9a84c] focus:ring-1 focus:ring-[#c9a84c]"
            placeholder="you@example.com"
          />
        </label>

        <button
          id="guessSubmitButton"
          type="submit"
          class="w-full rounded border border-[#c9a84c]/70 bg-[#7b6b57] px-4 py-3 font-heading text-sm uppercase text-[#fff9ef] transition hover:bg-[#8b7355] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#c9a84c] disabled:cursor-not-allowed disabled:opacity-60"
        >
          Submit
        </button>
        <p id="guessFormStatus" class="min-h-[1.25rem] text-center text-sm text-[#c9a84c]" aria-live="polite"></p>
      </form>
    </dialog>

    <dialog
      id="guessResultDialog"
      tabindex="-1"
      class="rounded-md border border-[#7b6b57]/60 bg-[#0b0c12]/95 p-0 text-primary-text shadow-2xl shadow-black/60"
      aria-labelledby="guessResultTitle"
      aria-describedby="guessResultMessage"
    >
      <div id="guessResultPanel">
        <h2 id="guessResultTitle">Your Whisper Is Sealed</h2>
        <p id="guessResultMessage"></p>
        <button id="guessResultConfirm" type="button">Confirm</button>
      </div>
    </dialog>

    <script>
      const GUESS_SUBMISSION_ENDPOINT = "https://guess-name.mithrilstudio.com/api/guesses";
      const guessTrigger = document.getElementById("guessTrigger");
      const guessDialog = document.getElementById("guessDialog");
      const guessForm = document.getElementById("guessForm");
      const guessName = document.getElementById("guessName");
      const guessSubmitButton = document.getElementById("guessSubmitButton");
      const guessFormStatus = document.getElementById("guessFormStatus");
      const guessResultDialog = document.getElementById("guessResultDialog");
      const guessResultTitle = document.getElementById("guessResultTitle");
      const guessResultMessage = document.getElementById("guessResultMessage");
      const guessResultConfirm = document.getElementById("guessResultConfirm");
      const heroBackground = document.getElementById("heroBackground");

      const setGuessFormStatus = (message = "", color = "#c9a84c") => {
        guessFormStatus.textContent = message;
        guessFormStatus.style.color = color;
      };

      const setGuessFormSubmitting = (isSubmitting) => {
        guessSubmitButton.disabled = isSubmitting;
        guessSubmitButton.textContent = isSubmitting ? "Submitting..." : "Submit";
      };

      const showGuessResult = ({ title, message }) => {
        guessResultTitle.textContent = title;
        guessResultMessage.textContent = message;

        if (guessDialog.open) {
          guessDialog.close();
        }

        guessResultDialog.showModal();
        requestAnimationFrame(() => {
          guessResultConfirm.focus({ preventScroll: true });
        });
      };

      (() => {
        const backgroundVideoSources = {
          standard: "./static/bg.mp4",
          high: "./static/bg_4k.mp4",
        };
        let activeBackgroundKey = "poster";
        let activeObjectUrl = null;
        let highResolutionDownloaded = false;

        if (!heroBackground || !window.fetch || !window.URL || !URL.createObjectURL) {
          return;
        }

        const downloadVideo = async (key, src) => {
          const response = await fetch(src);

          if (!response.ok) {
            throw new Error(`Unable to download ${src}: ${response.status}`);
          }

          return {
            key,
            objectUrl: URL.createObjectURL(await response.blob()),
          };
        };

        const replaceBackgroundWithVideo = ({ key, objectUrl }) => {
          if (key === "standard" && highResolutionDownloaded) {
            URL.revokeObjectURL(objectUrl);
            return;
          }

          if (activeBackgroundKey === "high" && key !== "high") {
            URL.revokeObjectURL(objectUrl);
            return;
          }

          const video = document.createElement("video");
          video.className = "hero-background-media";
          video.src = objectUrl;
          video.poster = "./static/bg.jpg";
          video.autoplay = true;
          video.defaultMuted = true;
          video.muted = true;
          video.loop = true;
          video.playsInline = true;
          video.preload = "auto";
          video.setAttribute("aria-hidden", "true");

          let isSettled = false;
          const settle = () => {
            if (isSettled) {
              return;
            }

            isSettled = true;

            if (key === "standard" && highResolutionDownloaded) {
              URL.revokeObjectURL(objectUrl);
              return;
            }

            const previousObjectUrl = activeObjectUrl;
            heroBackground.replaceChildren(video);
            activeBackgroundKey = key;
            activeObjectUrl = objectUrl;

            const playPromise = video.play();
            if (playPromise) {
              playPromise.catch(() => {});
            }

            if (previousObjectUrl) {
              URL.revokeObjectURL(previousObjectUrl);
            }
          };

          video.addEventListener("loadeddata", settle, { once: true });
          video.addEventListener(
            "error",
            () => {
              if (!isSettled) {
                URL.revokeObjectURL(objectUrl);
              }
            },
            { once: true },
          );
          video.load();
        };

        const startBackgroundDownloads = () => {
          downloadVideo("standard", backgroundVideoSources.standard)
            .then((video) => {
              if (highResolutionDownloaded) {
                URL.revokeObjectURL(video.objectUrl);
                return;
              }

              replaceBackgroundWithVideo(video);
            })
            .catch(() => {});

          downloadVideo("high", backgroundVideoSources.high)
            .then((video) => {
              highResolutionDownloaded = true;
              replaceBackgroundWithVideo(video);
            })
            .catch(() => {});
        };

        const queueBackgroundDownloads = () => {
          if ("requestIdleCallback" in window) {
            window.requestIdleCallback(startBackgroundDownloads, { timeout: 1500 });
            return;
          }

          window.setTimeout(startBackgroundDownloads, 250);
        };

        if (document.readyState === "complete") {
          queueBackgroundDownloads();
        } else {
          window.addEventListener("load", queueBackgroundDownloads, { once: true });
        }
      })();

      guessTrigger.addEventListener("click", () => {
        setGuessFormStatus();
        guessDialog.showModal();

        if (window.matchMedia("(pointer: coarse)").matches) {
          guessDialog.focus({ preventScroll: true });
        } else {
          requestAnimationFrame(() => {
            guessName.focus({ preventScroll: true });
          });
        }
      });

      guessForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!guessForm.checkValidity()) {
          guessForm.reportValidity();
          return;
        }

        const formData = new FormData(guessForm);

        setGuessFormSubmitting(true);
        setGuessFormStatus("Submitting...");

        try {
          const response = await fetch(GUESS_SUBMISSION_ENDPOINT, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              guessName: formData.get("guessName"),
              email: formData.get("email"),
            }),
          });

          if (!response.ok) {
            throw new Error("Unable to submit guess.");
          }

          guessForm.reset();
          setGuessFormStatus();
          showGuessResult({
            title: "Congratulations, Your Guess Is In",
            message:
              "Your whisper has been received. The answer will be revealed to everyone together in a future announcement.",
          });
        } catch {
          setGuessFormStatus();
          showGuessResult({
            title: "The Whisper Did Not Reach Us",
            message: "Something interrupted your submission. Please try again in a moment.",
          });
        } finally {
          setGuessFormSubmitting(false);
        }
      });

      guessDialog.addEventListener("click", (event) => {
        const dialogBounds = guessDialog.getBoundingClientRect();
        const isBackdropClick =
          event.clientX < dialogBounds.left ||
          event.clientX > dialogBounds.right ||
          event.clientY < dialogBounds.top ||
          event.clientY > dialogBounds.bottom;

        if (isBackdropClick) {
          guessDialog.close();
        }
      });

      guessResultConfirm.addEventListener("click", () => {
        guessResultDialog.close();
      });
    </script>
  </body>
</html>
