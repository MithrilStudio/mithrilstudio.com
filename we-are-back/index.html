    <script>
      (() => {
        if (typeof window.mithrilAmbientUserMuted !== "boolean") {
          window.mithrilAmbientUserMuted = true;
        }

        const ambientAudio = document.createElement("audio");
        const ambientAudioSources = [
          { src: "../static/Black_Banner_March.aac", type: "audio/aac" },
          { src: "../static/Black_Banner_March.mp3", type: "audio/mpeg" },
        ];
        const orderedAmbientAudioSources = /Android/i.test(navigator.userAgent || "")
          ? [...ambientAudioSources].reverse()
          : ambientAudioSources;

        orderedAmbientAudioSources.forEach(({ src, type }) => {
          const source = document.createElement("source");
          source.src = src;
          source.type = type;
          ambientAudio.append(source);
        });
        ambientAudio.preload = "auto";
        ambientAudio.load();
        const retryEvents = ["pointerdown", "click", "keydown", "touchstart"];
        const AMBIENT_AUDIO_SYNC_TOLERANCE_SECONDS = 0.18;
        let gestureListenersBound = false;
        let pendingAmbientPlayAttempt = null;
        let pendingTimelineSync = false;
        let hasResolvedAudioPrepared = false;
        let hasResolvedAudioStart = false;
        let resolveAmbientAudioPrepared = () => {};
        let resolveAmbientAudioStarted = () => {};

        const ambientAudioPrepared = new Promise((resolve) => {
          resolveAmbientAudioPrepared = resolve;
        });

        const ambientAudioStarted = new Promise((resolve) => {
          resolveAmbientAudioStarted = resolve;
        });

        const resolveAudioPrepared = () => {
          if (hasResolvedAudioPrepared) {
            return;
          }

          hasResolvedAudioPrepared = true;
          resolveAmbientAudioPrepared();
        };

        const resolveAudioStart = () => {
          if (hasResolvedAudioStart) {
            return;
          }

          hasResolvedAudioStart = true;
          resolveAmbientAudioStarted();
        };

        const getIntroScrollStartTimeMs = () => {
          return typeof window.mithrilIntroScrollStartTimeMs === "number" ? window.mithrilIntroScrollStartTimeMs : null;
        };

        const getTimelineElapsedSeconds = (nowMs = performance.now()) => {
          const scrollStartTimeMs = getIntroScrollStartTimeMs();

          if (scrollStartTimeMs === null) {
            return null;
          }

          return Math.max(0, (nowMs - scrollStartTimeMs) / 1000);
        };

        const getWrappedAudioTime = (elapsedSeconds) => {
          const duration = ambientAudio.duration;

          if (!Number.isFinite(duration) || duration <= 0) {
            return Math.max(0, elapsedSeconds);
          }

          return elapsedSeconds % duration;
        };

        const getAudioTimeDifference = (currentTime, targetTime) => {
          const duration = ambientAudio.duration;

          if (!Number.isFinite(duration) || duration <= 0) {
            return Math.abs(currentTime - targetTime);
          }

          const difference = Math.abs(currentTime - targetTime);
          return Math.min(difference, Math.abs(duration - difference));
        };

        const syncAmbientAudioToTimeline = ({ force = false, nowMs = performance.now() } = {}) => {
          const elapsedSeconds = getTimelineElapsedSeconds(nowMs);

          if (elapsedSeconds === null || ambientAudio.readyState < HTMLMediaElement.HAVE_METADATA) {
            return false;
          }

          const targetTime = getWrappedAudioTime(elapsedSeconds);
          const timeDifference = getAudioTimeDifference(ambientAudio.currentTime, targetTime);

          if (!force && timeDifference <= AMBIENT_AUDIO_SYNC_TOLERANCE_SECONDS) {
            return false;
          }

          try {
            ambientAudio.currentTime = targetTime;
            return true;
          } catch {
            return false;
          }
        };

        const queueTimelineSync = () => {
          if (getIntroScrollStartTimeMs() === null) {
            return false;
          }

          pendingTimelineSync = true;
          return true;
        };

        const canSyncAmbientAudioToTimeline = () => {
          return getIntroScrollStartTimeMs() !== null && ambientAudio.readyState >= HTMLMediaElement.HAVE_METADATA;
        };

        const syncAmbientAudioToPendingTimeline = () => {
          if (!pendingTimelineSync || !canSyncAmbientAudioToTimeline()) {
            return false;
          }

          pendingTimelineSync = false;
          return syncAmbientAudioToTimeline();
        };

        const configureAmbientAudio = () => {
          ambientAudio.id = "ambientAudio";
          ambientAudio.loop = true;
          ambientAudio.preload = "auto";
          ambientAudio.autoplay = false;
          ambientAudio.muted = Boolean(window.mithrilAmbientUserMuted);
          ambientAudio.volume = 1;
        };

        const loadAmbientAudio = () => {
          configureAmbientAudio();

          if (ambientAudio.networkState === HTMLMediaElement.NETWORK_EMPTY) {
            ambientAudio.load();
          }
        };

        const removeGestureListeners = () => {
          gestureListenersBound = false;
          retryEvents.forEach((eventName) => {
            window.removeEventListener(eventName, retryAmbientAudio);
          });
        };

        const bindGestureListeners = () => {
          if (gestureListenersBound) {
            return;
          }

          gestureListenersBound = true;
          retryEvents.forEach((eventName) => {
            window.addEventListener(eventName, retryAmbientAudio);
          });
        };

        const playAmbientAudio = ({ forceSync = false } = {}) => {
          configureAmbientAudio();

          if (window.mithrilAmbientUserPaused) {
            return Promise.resolve(false);
          }

          if (forceSync) {
            queueTimelineSync();
          }

          if (!ambientAudio.paused && !pendingAmbientPlayAttempt) {
            syncAmbientAudioToPendingTimeline();
            resolveAudioStart();
            removeGestureListeners();
            return Promise.resolve(true);
          }

          if (pendingAmbientPlayAttempt) {
            return pendingAmbientPlayAttempt;
          }

          if (ambientAudio.networkState === HTMLMediaElement.NETWORK_EMPTY) {
            ambientAudio.load();
          }

          const playPromise = ambientAudio.play();

          if (!playPromise) {
            syncAmbientAudioToPendingTimeline();
            resolveAudioStart();
            removeGestureListeners();
            return Promise.resolve(true);
          }

          pendingAmbientPlayAttempt = playPromise
            .then(() => {
              syncAmbientAudioToPendingTimeline();
              resolveAudioStart();
              removeGestureListeners();
              return true;
            })
            .catch(() => {
              if (!window.mithrilAmbientUserPaused) {
                bindGestureListeners();
              }

              return false;
            })
            .finally(() => {
              pendingAmbientPlayAttempt = null;
            });

          return pendingAmbientPlayAttempt;
        };

        function retryAmbientAudio() {
          if (window.mithrilAmbientUserPaused) {
            return;
          }

          if (getIntroScrollStartTimeMs() === null) {
            return;
          }

          playAmbientAudio({ forceSync: true });
        }

        ambientAudio.addEventListener("loadedmetadata", () => {
          resolveAudioPrepared();
        });
        ambientAudio.addEventListener("loadeddata", resolveAudioPrepared);
        ambientAudio.addEventListener("canplay", resolveAudioPrepared);
        ambientAudio.addEventListener("playing", () => {
          syncAmbientAudioToPendingTimeline();
          resolveAudioStart();
        });
        ambientAudio.addEventListener("timeupdate", () => {
          if (ambientAudio.currentTime > 0) {
            resolveAudioStart();
          }
        });

        window.mithrilAmbientAudio = ambientAudio;
        window.mithrilAmbientAudioPrepared = ambientAudioPrepared;
        window.mithrilAmbientAudioStarted = ambientAudioStarted;
        window.prepareMithrilAmbientAudio = loadAmbientAudio;
        window.startMithrilAmbientAudio = playAmbientAudio;
        window.syncMithrilAmbientAudioToTimeline = syncAmbientAudioToTimeline;
        loadAmbientAudio();
        window.addEventListener("load", loadAmbientAudio, { once: true });
        window.addEventListener("pageshow", () => {
          if (window.mithrilAmbientUserPaused) {
            return;
          }

          if (getIntroScrollStartTimeMs() === null) {
            loadAmbientAudio();
            return;
          }

          playAmbientAudio({ forceSync: true });
        });
        document.addEventListener(
          "DOMContentLoaded",
          () => {
            document.body.prepend(ambientAudio);
          },
          { once: true },
        );
      })();
    </script>
    <script>
      (() => {
        const documentElement = document.documentElement;
        const languages =
          Array.isArray(navigator.languages) && navigator.languages.length
            ? navigator.languages
            : [navigator.language || documentElement.lang || "en-US"];
        const normalizedLanguages = languages.map((language) => language.toLowerCase());
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
        const mainlandChinaTimeZones = new Set([
          "Asia/Shanghai",
          "Asia/Urumqi",
          "Asia/Chongqing",
          "Asia/Chungking",
          "Asia/Harbin",
          "Asia/Kashgar",
          "PRC",
        ]);
        const shouldAvoidGoogleFonts =
          mainlandChinaTimeZones.has(timeZone) ||
          normalizedLanguages.some((language) => /^zh(?:$|-hans\b|-cn\b)/.test(language));

        const fontFaces = {
          google: {
            body: {
              default: "Noto+Sans",
              "zh-Hans": "Noto+Sans+SC",
              "zh-Hant": "Noto+Sans+TC",
              ja: "Noto+Sans+JP",
              ko: "Noto+Sans+KR",
            },
            heading: "Cinzel",
            introBody: "IM+Fell+English",
            serif: "Noto+Serif",
          },
          jsdelivr: {
            body: {
              default: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans@latest/wght.css",
              "zh-Hans": "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans-sc@latest/wght.css",
              "zh-Hant": "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans-tc@latest/wght.css",
              ja: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans-jp@latest/wght.css",
              ko: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans-kr@latest/wght.css",
            },
            heading: "https://cdn.jsdelivr.net/npm/@fontsource-variable/cinzel@latest/wght.css",
            introBody: "https://cdn.jsdelivr.net/npm/@fontsource/im-fell-english@latest/400.css",
            serif: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-serif@latest/wght.css",
          },
        };

        const addPreconnect = (href, crossOrigin = false) => {
          const link = document.createElement("link");
          link.rel = "preconnect";
          link.href = href;
          if (crossOrigin) {
            link.crossOrigin = "";
          }
          document.head.append(link);
        };

        const addStylesheet = (href, onError) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = href;
          if (onError) {
            link.addEventListener("error", onError, { once: true });
          }
          document.head.append(link);
        };

        const loadJsDelivrFonts = () => {
          documentElement.dataset.fontCdn = "jsdelivr";
          addPreconnect("https://cdn.jsdelivr.net");
          addStylesheet(fontFaces.jsdelivr.body.default);
          addStylesheet(fontFaces.jsdelivr.heading);
          addStylesheet(fontFaces.jsdelivr.introBody);
          addStylesheet(fontFaces.jsdelivr.serif);
        };

        if (shouldAvoidGoogleFonts) {
          loadJsDelivrFonts();
          return;
        }

        documentElement.dataset.fontCdn = "google";
        addPreconnect("https://fonts.googleapis.com");
        addPreconnect("https://fonts.gstatic.com", true);
        addStylesheet(
          `https://fonts.googleapis.com/css2?family=${fontFaces.google.heading}:wght@400;600;700&family=${fontFaces.google.introBody}&family=${fontFaces.google.serif}:wght@400;500;600;700&family=${fontFaces.google.body.default}:wght@400;500;600;700&display=swap`,
          loadJsDelivrFonts,
        );
      })();
    </script>

    <script>
      const revealTrigger = document.getElementById("revealTrigger");
      const getRevealTriggerRemaining = () => {
        const targetDate = new Date(Date.UTC(2026, 6, 6, 14, 0, 0));
        const msRemaining = targetDate.getTime() - Date.now();
        return msRemaining;
      };
      const updateRevealTriggerText = () => {
        const msRemaining = getRevealTriggerRemaining();

        if (msRemaining <= 0) {
          revealTrigger.innerHTML = "Unveil";
          revealTrigger.disabled = false;
          return;
        }

        const msPerHour = 1000 * 60 * 60;
        const msPerDay = msPerHour * 24;

        if (msRemaining <= msPerDay) {
          if (msRemaining <= msPerHour) {
            revealTrigger.innerHTML = `Unveil in <span class="unveil-trigger-remain">an</span> hour`;
          } else {
            const hoursRemaining = Math.ceil(msRemaining / msPerHour);
            revealTrigger.innerHTML = `Unveil in <span class="unveil-trigger-remain">${hoursRemaining}</span> hours`;
          }
          revealTrigger.disabled = true;
          return;
        }

        const daysRemaining = Math.ceil(msRemaining / msPerDay);
        revealTrigger.innerHTML = `Unveil in <span class="unveil-trigger-remain">${daysRemaining}</span> days`;
        revealTrigger.disabled = true;
      };
      updateRevealTriggerText();

      const scheduleHourlyRevealTriggerUpdate = () => {
        const msPerHour = 1000 * 60 * 60;
        const msRemaining = getRevealTriggerRemaining();

        if (msRemaining <= 0) {
          updateRevealTriggerText();
          return;
        }

        const msUntilNextBoundary = msRemaining % msPerHour || msPerHour;

        window.setTimeout(() => {
          updateRevealTriggerText();
          window.setInterval(updateRevealTriggerText, msPerHour);
        }, msUntilNextBoundary);
      };
      scheduleHourlyRevealTriggerUpdate();

      const scheduleOpenTimeRefresh = () => {
        const msRemaining = getRevealTriggerRemaining();

        if (msRemaining <= 0) {
          return;
        }

        window.setTimeout(() => {
          window.location.reload();
        }, msRemaining);
      };
      scheduleOpenTimeRefresh();

      const heroBackground = document.getElementById("heroBackground");
      const BACKGROUND_PLAY_RETRY_DELAYS_MS = [0, 300, 1200];
      const BACKGROUND_PAUSE_RESUME_DELAYS_MS = [80, 300, 1200];
      window.mithrilIntroScrollStartTimeMs = null;
      window.mithrilAmbientUserMuted =
        typeof window.mithrilAmbientUserMuted === "boolean" ? window.mithrilAmbientUserMuted : true;
      let introLaunchRequested = false;

      const startBackgroundRestoration = () => {
        if (document.body.classList.contains("is-intro-finished")) {
          return;
        }

        document.body.classList.add("is-intro-finished");
        startCurrentBackgroundVideo();
        requestAnimationFrame(() => {
          document.body.classList.add("is-background-restoring");
          startCurrentBackgroundVideo();
        });
      };

      const isBackgroundVideoRecoverable = (video) => {
        return Boolean(video && video.isConnected && heroBackground?.contains(video) && !video.ended && !video.error);
      };

      const resumePausedBackgroundVideo = (video) => {
        if (!isBackgroundVideoRecoverable(video)) {
          return;
        }

        if (video.paused) {
          playBackgroundVideo(video);
        }

        if (video.dataset.backgroundVideoResumePending === "true") {
          return;
        }

        video.dataset.backgroundVideoResumePending = "true";
        BACKGROUND_PAUSE_RESUME_DELAYS_MS.forEach((delayMs, index) => {
          window.setTimeout(() => {
            if (isBackgroundVideoRecoverable(video) && video.paused) {
              playBackgroundVideo(video);
            }

            if (index === BACKGROUND_PAUSE_RESUME_DELAYS_MS.length - 1) {
              delete video.dataset.backgroundVideoResumePending;
            }
          }, delayMs);
        });
      };

      const configureBackgroundVideo = (video) => {
        if (!video) {
          return;
        }

        video.classList.add("hero-background-video");
        video.autoplay = true;
        video.defaultMuted = true;
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.preload = "auto";
        video.disablePictureInPicture = true;
        video.disableRemotePlayback = true;
        video.draggable = false;
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.setAttribute("controlslist", "nodownload noplaybackrate noremoteplayback");
        video.setAttribute("disablepictureinpicture", "");
        video.setAttribute("disableremoteplayback", "");
        video.setAttribute("aria-hidden", "true");
        video.oncontextmenu = (event) => event.preventDefault();
        video.ondragstart = (event) => event.preventDefault();

        if (video.dataset.backgroundVideoConfigured !== "true") {
          video.dataset.backgroundVideoConfigured = "true";
          video.addEventListener("pause", () => {
            resumePausedBackgroundVideo(video);
          });
          video.addEventListener(
            "playing",
            () => {
              video.removeAttribute("poster");
            },
            { once: true },
          );
        }
      };

      const playBackgroundVideo = (video) => {
        if (!video) {
          return Promise.resolve(false);
        }

        configureBackgroundVideo(video);

        const playPromise = video.play();
        if (playPromise) {
          return playPromise.then(() => true).catch(() => false);
        }

        return Promise.resolve(true);
      };

      const isBackgroundVideoPlaying = (video) => {
        return Boolean(video && !video.paused && !video.ended && video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA);
      };

      const startCurrentBackgroundVideo = () => {
        return playBackgroundVideo(heroBackground?.querySelector("video"));
      };

      const retryCurrentBackgroundVideo = () => {
        BACKGROUND_PLAY_RETRY_DELAYS_MS.forEach((delayMs) => {
          window.setTimeout(startCurrentBackgroundVideo, delayMs);
        });
      };

      (() => {
        const backgroundVideoSources = {
          high: {
            src: "../static/bg_4k.mp4",
          },
        };
        let activeBackgroundKey = "standard";
        let backgroundUpgradeStarted = false;

        if (!heroBackground) {
          return;
        }

        const syncVideoToActivePlayback = (video) => {
          const activeVideo = heroBackground.querySelector("video");

          if (!activeVideo || activeVideo === video) {
            return false;
          }

          const playbackTime = activeVideo.currentTime;
          const targetDuration = video.duration;

          if (!Number.isFinite(playbackTime) || !Number.isFinite(targetDuration) || targetDuration <= 0) {
            return false;
          }

          const targetTime = playbackTime % targetDuration;

          if (Math.abs(video.currentTime - targetTime) < 0.05) {
            return false;
          }

          try {
            video.currentTime = Math.min(targetTime, Math.max(targetDuration - 0.05, 0));
            return true;
          } catch {
            return false;
          }
        };

        const replaceBackgroundWithVideo = ({ key, src }) => {
          if (activeBackgroundKey === "high" && key !== "high") {
            return;
          }

          // canPlayType() is only advisory: Windows browsers can sometimes play
          // HEVC through the OS pipeline while returning an empty hvc1 result.
          // Let the real media load decide, then keep bg.mp4 if this source fails.
          const video = document.createElement("video");
          video.className = "hero-background-media hero-background-video";
          configureBackgroundVideo(video);
          video.style.opacity = "0";
          video.poster = "../static/bg.jpg";
          video.src = src;
          heroBackground.append(video);

          let isSettled = false;
          let syncAttempts = 0;
          const settle = () => {
            if (isSettled) {
              return;
            }

            if (key === "high" && syncAttempts < 3 && syncVideoToActivePlayback(video)) {
              syncAttempts += 1;
              video.addEventListener("seeked", settle, { once: true });
              window.setTimeout(settle, 500);
              return;
            }

            isSettled = true;

            const previousVideos = [...heroBackground.querySelectorAll("video")].filter((item) => item !== video);
            const previousVideo = previousVideos[0] || null;
            playBackgroundVideo(video).then((didPlay) => {
              if (!didPlay && isBackgroundVideoPlaying(previousVideo)) {
                video.remove();
                return;
              }

              video.style.opacity = "";
              previousVideos.forEach((item) => {
                item.remove();
              });
              activeBackgroundKey = key;
              startCurrentBackgroundVideo();
            });
          };

          video.addEventListener("canplay", settle, { once: true });
          video.addEventListener("loadeddata", settle, { once: true });
          video.addEventListener(
            "error",
            () => {
              if (!isSettled) {
                video.remove();
              }
            },
            { once: true },
          );
          video.load();
        };

        const startBackgroundDownloads = () => {
          if (backgroundUpgradeStarted) {
            return;
          }

          backgroundUpgradeStarted = true;

          replaceBackgroundWithVideo({
            key: "high",
            ...backgroundVideoSources.high,
          });
        };

        window.startMithrilBackgroundVideo = startBackgroundDownloads;
      })();

      startCurrentBackgroundVideo();
      window.startMithrilBackgroundVideo?.();
      ["pointerdown", "click", "touchstart", "keydown"].forEach((eventName) => {
        window.addEventListener(eventName, retryCurrentBackgroundVideo, { passive: true });
      });

      (() => {
        const audioToggle = document.getElementById("audioToggle");
        const ambientAudio = window.mithrilAmbientAudio;

        if (!audioToggle || !ambientAudio) {
          return;
        }

        const syncAudioToggleState = () => {
          const isMuted = ambientAudio.muted;
          audioToggle.classList.toggle("is-muted", isMuted);
          audioToggle.setAttribute("aria-pressed", String(isMuted));
          audioToggle.setAttribute("aria-label", isMuted ? "Unmute background music" : "Mute background music");
        };

        const requestAmbientAudioPlay = () => {
          if (typeof window.startMithrilAmbientAudio === "function") {
            return window.startMithrilAmbientAudio({ forceSync: true });
          }

          const playPromise = ambientAudio.play();
          if (playPromise) {
            return playPromise.then(() => true).catch(() => false);
          }

          return Promise.resolve(true);
        };

        const restoreBackgroundAfterAudioChange = () => {
          requestAnimationFrame(() => {
            retryCurrentBackgroundVideo();
          });
        };

        ["pointerdown", "click", "keydown", "touchstart"].forEach((eventName) => {
          audioToggle.addEventListener(eventName, (event) => event.stopPropagation());
        });

        audioToggle.addEventListener("click", () => {
          const shouldMute = !ambientAudio.muted;
          window.mithrilAmbientUserMuted = shouldMute;
          ambientAudio.muted = shouldMute;

          if (!shouldMute && ambientAudio.paused) {
            window.mithrilAmbientUserPaused = false;
            Promise.resolve(requestAmbientAudioPlay())
              .then((didPlay) => {
                if (!didPlay && ambientAudio.paused) {
                  window.mithrilAmbientUserMuted = true;
                  ambientAudio.muted = true;
                  syncAudioToggleState();
                }
              })
              .finally(restoreBackgroundAfterAudioChange);
          } else {
            restoreBackgroundAfterAudioChange();
          }

          syncAudioToggleState();
        });

        ambientAudio.addEventListener("playing", restoreBackgroundAfterAudioChange);
        ambientAudio.addEventListener("play", syncAudioToggleState);
        ambientAudio.addEventListener("playing", syncAudioToggleState);
        ambientAudio.addEventListener("pause", syncAudioToggleState);
        ambientAudio.addEventListener("volumechange", syncAudioToggleState);
        syncAudioToggleState();
      })();

      const fontReady = Promise.race([
        document.fonts ? document.fonts.ready.catch(() => {}) : Promise.resolve(),
        new Promise((resolve) => window.setTimeout(resolve, 1200)),
      ]);
      const ambientReady = Promise.race([
        window.mithrilAmbientAudioPrepared || Promise.resolve(),
        new Promise((resolve) => window.setTimeout(resolve, 5000)),
      ]);

      const primeRevealAudio = () => {
        const ambientAudio = window.mithrilAmbientAudio;
        window.mithrilAmbientUserMuted = false;
        window.mithrilAmbientUserPaused = false;
        if (ambientAudio) {
          ambientAudio.muted = false;
        }

        retryCurrentBackgroundVideo();
        window.prepareMithrilAmbientAudio?.();
        window.startMithrilAmbientAudio?.({ forceSync: true });
      };
    </script>
