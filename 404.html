<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found</title>
    <script>
      (() => {
        const documentElement = document.documentElement;
        const languages =
          Array.isArray(navigator.languages) && navigator.languages.length
            ? navigator.languages
            : [navigator.language || documentElement.lang || "en-US"];
        const normalizedLanguages = languages.map((language) => language.toLowerCase());
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
        const mainlandChinaTimeZones = new Set([
          "Asia/Shanghai",
          "Asia/Urumqi",
          "Asia/Chongqing",
          "Asia/Chungking",
          "Asia/Harbin",
          "Asia/Kashgar",
          "PRC",
        ]);
        const shouldAvoidGoogleFonts =
          mainlandChinaTimeZones.has(timeZone) ||
          normalizedLanguages.some((language) => /^zh(?:$|-hans\b|-cn\b)/.test(language));

        const fontFaces = {
          google: {
            body: "Noto+Sans",
            heading: "Cinzel",
            serif: "Noto+Serif",
          },
          jsdelivr: {
            body: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-sans@latest/wght.css",
            heading: "https://cdn.jsdelivr.net/npm/@fontsource-variable/cinzel@latest/wght.css",
            serif: "https://cdn.jsdelivr.net/npm/@fontsource-variable/noto-serif@latest/wght.css",
          },
        };

        const addPreconnect = (href, crossOrigin = false) => {
          const link = document.createElement("link");
          link.rel = "preconnect";
          link.href = href;
          if (crossOrigin) {
            link.crossOrigin = "";
          }
          document.head.append(link);
        };

        const addStylesheet = (href, onError) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = href;
          if (onError) {
            link.addEventListener("error", onError, { once: true });
          }
          document.head.append(link);
        };

        const loadJsDelivrFonts = () => {
          documentElement.dataset.fontCdn = "jsdelivr";
          addPreconnect("https://cdn.jsdelivr.net");
          addStylesheet(fontFaces.jsdelivr.body);
          addStylesheet(fontFaces.jsdelivr.heading);
          addStylesheet(fontFaces.jsdelivr.serif);
        };

        if (shouldAvoidGoogleFonts) {
          loadJsDelivrFonts();
          return;
        }

        documentElement.dataset.fontCdn = "google";
        addPreconnect("https://fonts.googleapis.com");
        addPreconnect("https://fonts.gstatic.com", true);
        addStylesheet(
          `https://fonts.googleapis.com/css2?family=${fontFaces.google.heading}:wght@400;600;700&family=${fontFaces.google.serif}:wght@400;500;600;700&family=${fontFaces.google.body}:wght@400;500;600;700&display=swap`,
          loadJsDelivrFonts,
        );
      })();
    </script>
    <style>
      :root {
        --color-primary-bg: #0a0a0f;
        --color-primary-text: #e8e6e3;
        --color-accent: #7b6b57;
        --color-secondary: #8b7355;
        --site-font-body: "Noto Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --site-font-heading: "Cinzel", serif;
        --site-font-serif: "Noto Serif", Georgia, serif;
      }
      html[data-font-cdn="jsdelivr"] {
        --site-font-body: "Noto Sans Variable", "Noto Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --site-font-heading: "Cinzel Variable", "Cinzel", serif;
        --site-font-serif: "Noto Serif Variable", "Noto Serif", Georgia, serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        background-color: var(--color-primary-bg);
        color: var(--color-primary-text);
        font-family: var(--site-font-body);
        line-height: 1.6;
        letter-spacing: 0;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      h1,
      h2 {
        font-family: var(--site-font-heading);
        letter-spacing: 0;
      }
    </style>
    <style>
      .not-found-page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background: #05070f;
      }

      .not-found-background {
        position: absolute;
        inset: 0;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .not-found-background::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          radial-gradient(circle at 50% 36%, rgba(92, 77, 55, 0.2), transparent 34%),
          linear-gradient(180deg, rgba(1, 2, 6, 0.76), rgba(1, 2, 6, 0.94));
        pointer-events: none;
      }

      .not-found-media {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.52) saturate(0.86);
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .not-found-video {
        opacity: 0;
        transition: opacity 1200ms ease;
      }

      .not-found-video.is-ready {
        opacity: 1;
      }

      .not-found-content {
        position: relative;
        z-index: 2;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 72px 24px 54px;
        text-align: center;
      }

      .not-found-inner {
        width: min(100%, 720px);
      }

      .not-found-kicker {
        margin: 0 0 18px;
        color: rgba(232, 230, 227, 0.72);
        font-family: var(--site-font-serif);
        font-size: 15px;
        font-weight: 600;
      }

      .not-found-code {
        margin: 0;
        color: #fff8ed;
        font-size: clamp(88px, 18vw, 172px);
        font-weight: 700;
        line-height: 0.86;
        text-shadow:
          0 4px 32px rgba(0, 0, 0, 0.95),
          0 0 30px rgba(238, 217, 167, 0.22);
      }

      .not-found-title {
        margin: 28px 0 0;
        color: #fff8ed;
        font-size: clamp(30px, 7vw, 64px);
        font-weight: 700;
        line-height: 1;
        text-shadow: 0 4px 26px rgba(0, 0, 0, 0.9);
      }

      .not-found-copy {
        width: min(100%, 560px);
        margin: 22px auto 0;
        color: rgba(232, 230, 227, 0.84);
        font-family: var(--site-font-serif);
        font-size: 18px;
      }

      .not-found-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-top: 34px;
      }

      .not-found-button {
        display: inline-flex;
        min-width: 158px;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(201, 168, 76, 0.72);
        border-radius: 4px;
        background: rgba(123, 107, 87, 0.76);
        color: #fff9ef;
        font-family: var(--site-font-serif);
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.42);
        transition:
          background 200ms ease,
          border-color 200ms ease,
          color 200ms ease,
          transform 200ms ease;
      }

      .not-found-button:hover,
      .not-found-button:focus-visible {
        background: rgba(139, 115, 85, 0.9);
        border-color: rgba(201, 168, 76, 0.95);
        color: #fffdf5;
      }

      .not-found-button:active {
        transform: scale(0.97);
      }

      .not-found-button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.42);
      }

      .not-found-button-secondary {
        background: rgba(11, 12, 18, 0.72);
        border-color: rgba(201, 168, 76, 0.45);
      }

      .not-found-highlight {
        position: absolute;
        right: 0;
        bottom: 30px;
        left: 0;
        z-index: 2;
        display: flex;
        justify-content: center;
      }

      .not-found-highlight img {
        display: block;
        width: auto;
        height: 2px;
      }

      .icp-filing {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: none;
        justify-content: center;
        padding: 6px 12px;
        background: linear-gradient(180deg, rgba(5, 7, 15, 0), rgba(5, 7, 15, 0.78));
        pointer-events: auto;
      }

      .icp-filing.is-visible {
        display: flex;
      }

      .icp-filing a {
        color: rgba(232, 230, 227, 0.72);
        font-family: var(--site-font-body);
        font-size: 12px;
        line-height: 1.4;
        text-align: center;
        text-decoration: none;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
      }

      .icp-filing a:hover,
      .icp-filing a:focus-visible {
        color: rgba(232, 230, 227, 0.96);
        text-decoration: underline;
      }

      .icp-filing a:focus-visible {
        outline: none;
        box-shadow: 0 2px 0 rgba(201, 168, 76, 0.9);
      }

      @media (max-width: 520px) {
        .not-found-content {
          align-items: flex-start;
          padding: 18vh 20px 82px;
        }

        .not-found-kicker {
          margin-bottom: 14px;
          font-size: 14px;
        }

        .not-found-title {
          margin-top: 24px;
        }

        .not-found-copy {
          font-size: 16px;
        }

        .not-found-actions {
          gap: 12px;
          margin-top: 30px;
        }

        .not-found-button {
          width: min(100%, 260px);
          min-height: 46px;
          font-size: 15px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .not-found-video,
        .not-found-button {
          transition-duration: 1ms;
        }
      }
    </style>
  </head>
  <body>
    <main class="not-found-page" aria-labelledby="notFoundTitle">
      <div class="not-found-background" aria-hidden="true">
        <img src="/static/bg.jpg" alt="" class="not-found-media" />
        <video
          id="notFoundVideo"
          class="not-found-media not-found-video"
          src="/static/bg.mp4"
          poster="/static/bg.jpg"
          autoplay
          muted
          loop
          playsinline
          webkit-playsinline
          preload="auto"
          controlslist="nodownload noplaybackrate noremoteplayback"
          disablepictureinpicture
          disableremoteplayback
          draggable="false"
          aria-hidden="true"
        ></video>
      </div>

      <div class="not-found-content">
        <div class="not-found-inner">
          <h1 class="not-found-code">404</h1>
          <h2 id="notFoundTitle" class="not-found-title">This Gate Is Missing</h2>
          <p class="not-found-copy">
            The page you requested is not here. Return to the relaunch page and continue from the main hall.
          </p>
          <nav class="not-found-actions" aria-label="404 navigation">
            <a class="not-found-button" href="/we-are-back/">Return Home</a>
          </nav>
        </div>
      </div>

      <div class="not-found-highlight" aria-hidden="true">
        <img src="/static/bottom_highlight.png" alt="" />
      </div>
    </main>

    <footer id="icpFiling" class="icp-filing" aria-label="ICP 备案信息">
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">沪ICP备2026032805号-1</a>
    </footer>
    <script>
      (() => {
        const hostname = (window.location.hostname || "").toLowerCase();
        const isLocalhost =
          hostname === "localhost" || hostname === "127.0.0.1" || hostname === "::1";
        const isMyrionDomain =
          hostname === "myrionstudio.com" || hostname.endsWith(".myrionstudio.com");
        if (!isLocalhost && !isMyrionDomain) {
          return;
        }

        const languages =
          Array.isArray(navigator.languages) && navigator.languages.length
            ? navigator.languages
            : [navigator.language || ""];
        const normalizedLanguages = languages.map((language) => (language || "").toLowerCase());
        const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
        const mainlandChinaTimeZones = new Set([
          "Asia/Shanghai",
          "Asia/Urumqi",
          "Asia/Chongqing",
          "Asia/Chungking",
          "Asia/Harbin",
          "Asia/Kashgar",
          "PRC",
        ]);
        const isSimplifiedChinese = normalizedLanguages.some((language) =>
          /^zh(?:$|-hans\b|-cn\b)/.test(language),
        );
        const isChinaTimezone = mainlandChinaTimeZones.has(timeZone);

        if (!isSimplifiedChinese && !isChinaTimezone) {
          return;
        }

        const filing = document.getElementById("icpFiling");
        if (filing) {
          filing.classList.add("is-visible");
        }
      })();
    </script>

    <script>
      (() => {
        const video = document.getElementById("notFoundVideo");
        if (!video) {
          return;
        }

        const configureVideo = (item) => {
          item.autoplay = true;
          item.defaultMuted = true;
          item.muted = true;
          item.loop = true;
          item.playsInline = true;
          item.preload = "auto";
          item.disablePictureInPicture = true;
          item.disableRemotePlayback = true;
          item.draggable = false;
          item.setAttribute("playsinline", "");
          item.setAttribute("webkit-playsinline", "");
          item.setAttribute("controlslist", "nodownload noplaybackrate noremoteplayback");
          item.setAttribute("disablepictureinpicture", "");
          item.setAttribute("disableremoteplayback", "");
          item.setAttribute("aria-hidden", "true");
        };

        const playVideo = (item) => {
          configureVideo(item);
          const playPromise = item.play();
          if (playPromise) {
            playPromise.catch(() => {});
          }
        };

        video.addEventListener("playing", () => {
          video.classList.add("is-ready");
          video.removeAttribute("poster");
        });

        playVideo(video);
        ["pointerdown", "click", "touchstart", "keydown"].forEach((eventName) => {
          window.addEventListener(eventName, () => playVideo(video), { passive: true });
        });
      })();
    </script>
